---
name: Tests on Ubuntu

# yamllint disable-line rule:truthy
on:
  pull_request:
    paths:
      - '.github/workflows/tests-ubuntu.yaml'
      - '.clang-tidy'
      - '**.cpp'
      - '**.hpp'
      - '**.hpp.in'
      - 'CMakeLists.txt'
      - '**/CMakeLists.txt'
      - '**.cmake'
      - '**.cmake.in'
      - 'docker/**'
      - 'vendor/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/tests-ubuntu.yaml'
      - '.clang-tidy'
      - '**.cpp'
      - '**.hpp'
      - '**.hpp.in'
      - 'CMakeLists.txt'
      - '**/CMakeLists.txt'
      - '**.cmake'
      - '**.cmake.in'
      - 'docker/**'
      - 'vendor/**'

concurrency:
  group: ${{github.workflow}}-${{github.ref == github.ref_protected && github.run_id || github.event.pull_request.number || github.ref}}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: jidicula/clang-format-action@654a770daa28443dd111d133e4083e21c1075674  # v4.18.0
        with:
          clang-format-version: '21'
      - name: Prefer 'if defined'/'if !defined' over 'ifdef'/'ifndef'
        run: if grep -RE "(ifdef|ifndef)" $(git ls-files '*.[ch]pp'); then exit 1; fi
      - name: Do not include <iostream> in the headers of the library
        run: if grep -R "#include <iostream>" $(git ls-files 'src/*.hpp'); then exit 1; fi
      - name: Find modifications of Kokkos reserved macros
        run: if grep -RE "(define|undef) KOKKOS_" $(git ls-files '*.[ch]pp'); then exit 1; fi

  id_repo:
    runs-on: ubuntu-latest
    steps:
      - name: Identify repository
        id: identify_repo
        run: |
          echo "in_base_repo=${{(github.event_name == 'push' && github.repository == 'CExA-project/ddc') || github.event.pull_request.head.repo.full_name == 'CExA-project/ddc'}}" >> "$GITHUB_OUTPUT"
    outputs: {in_base_repo: '${{steps.identify_repo.outputs.in_base_repo}}'}

  docker-build:
    strategy:
      fail-fast: false
      matrix:
        image: ['oldest', 'latest']
        backend: ['cpu', 'cuda', 'hip']
    needs: id_repo
    runs-on: ubuntu-latest
    permissions:
      packages: write  # Required to push to registry
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be  # v1.3.1
        with: {tool-cache: true, large-packages: false}
      - name: Checkout built branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}
      - name: Build
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --build-arg BACKEND=${{matrix.backend}} \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --cache-from ghcr.io/cexa-project/ddc/${{matrix.image}}_${{matrix.backend}} \
            -t ghcr.io/cexa-project/ddc/${{matrix.image}}_${{matrix.backend}} \
            -t ghcr.io/cexa-project/ddc/${{matrix.image}}_${{matrix.backend}}:${GITHUB_SHA:0:7} \
            docker/${{matrix.image}}
      - name: Publish image for current SHA
        if: needs.id_repo.outputs.in_base_repo == 'true'
        run: |
          docker push ghcr.io/cexa-project/ddc/${{matrix.image}}_${{matrix.backend}}:${GITHUB_SHA:0:7}
      - name: Publish latest (default) image
        if: github.event_name == 'push' && github.ref_name == 'main' && needs.id_repo.outputs.in_base_repo == 'true'
        run: |
          docker push ghcr.io/cexa-project/ddc/${{matrix.image}}_${{matrix.backend}}
      - name: Create image tarball
        if: needs.id_repo.outputs.in_base_repo == 'false'
        run: |
          docker save ghcr.io/cexa-project/ddc/${{matrix.image}}_${{matrix.backend}}:${GITHUB_SHA:0:7} > ${{matrix.image}}_${{matrix.backend}}.tar
      - name: Generate docker artifact from image
        if: needs.id_repo.outputs.in_base_repo == 'false'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{matrix.image}}_${{matrix.backend}}-artifact
          path: ${{matrix.image}}_${{matrix.backend}}.tar
          retention-days: 1

  coverage-test:
    strategy:
      fail-fast: false
      matrix:
        image: ['latest']
        backend:
          - name: 'cpu'
            c_compiler: 'gcc'
            cxx_compiler: 'g++'
        cxx_version: ['20']
        cmake_build_type: ['None']
    runs-on: ubuntu-latest
    needs: [docker-build, id_repo]
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be  # v1.3.1
        with: {tool-cache: true, large-packages: false}
      - name: Checkout built branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Collect image artifact
        if: needs.id_repo.outputs.in_base_repo == 'false'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: |
            ${{matrix.image}}_${{matrix.backend.name}}-artifact
      - name: Load image artifact into docker
        if: needs.id_repo.outputs.in_base_repo == 'false'
        run: |
          docker load < ${{matrix.image}}_${{matrix.backend.name}}.tar
          rm ${{matrix.image}}_${{matrix.backend.name}}.tar
      - name: Coverage test
        run: |
          cat<<-'EOF' > run.sh
            set -e

            export CMAKE_BUILD_PARALLEL_LEVEL=4
            export CMAKE_BUILD_TYPE=${{matrix.cmake_build_type}}

            export CC=${{matrix.backend.c_compiler}}
            export CXX=${{matrix.backend.cxx_compiler}}

            cmake \
              -D CMAKE_CXX_STANDARD=${{matrix.cxx_version}} \
              -D CMAKE_CXX_FLAGS="-DNDEBUG --coverage -fprofile-update=atomic -fno-inline -fno-inline-small-functions -fno-default-inline" \
              -D DDC_BUILD_BENCHMARKS=OFF \
              -D DDC_BUILD_KERNELS_FFT=ON \
              -D DDC_BUILD_KERNELS_SPLINES=ON \
              -D DDC_BUILD_PDI_WRAPPER=ON \
              -D DDC_BUILD_EXAMPLES=OFF \
              -D DDC_GTest_DEPENDENCY_POLICY=INSTALLED \
              -D DDC_Kokkos_DEPENDENCY_POLICY=INSTALLED \
              -D DDC_KokkosFFT_DEPENDENCY_POLICY=INSTALLED \
              -D DDC_KokkosKernels_DEPENDENCY_POLICY=INSTALLED \
              -B build

            cmake --build build
            ctest --test-dir build

            gcovr \
              --exclude-throw-branches \
              --filter src/ddc \
              --lcov coverage.lcov \
              --merge-mode-functions=merge-use-line-0 \
              build

            rm -rf build
          EOF

          docker run \
            --user 0 \
            --workdir ${{github.workspace}} \
            --volume ${{github.workspace}}:${{github.workspace}} \
            ghcr.io/cexa-project/ddc/${{matrix.image}}_${{matrix.backend.name}}:${GITHUB_SHA:0:7} \
            bash run.sh
      - name: Upload coverage reports to Codecov with GitHub Action
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: coverage.lcov
          disable_search: true
          token: ${{secrets.CODECOV_TOKEN}}

  test:
    if: github.ref_name != 'main'
    strategy:
      fail-fast: false
      matrix:
        image: ['oldest', 'latest']
        backend:
          - name: 'cpu'
            c_compiler: 'gcc'
            cxx_compiler: 'g++'
            ddc_extra_cxx_flags: '-Wextra-semi -Wold-style-cast'
          - name: 'cpu'
            c_compiler: 'clang'
            cxx_compiler: 'clang++'
            ddc_extra_cxx_flags: '-Wextra-semi -Wextra-semi-stmt -Wold-style-cast'
          - name: 'cuda'
            c_compiler: '${CUDA_GCC}'
            cxx_compiler: '${CUDA_GXX}'
            ddc_extra_cxx_flags: ''
          - name: 'hip'
            c_compiler: 'hipcc'
            cxx_compiler: 'hipcc'
            ddc_extra_cxx_flags: ''
        cxx_version: ['20', '23']
        build_type:
          - cmake_build_type: 'Release'
            cxx_flags: ''
          - cmake_build_type: 'Debug'
            cxx_flags: '-O1'
        exclude:
          - image: 'oldest'  # nvcc 12 only supports C++-20
            backend:
              name: 'cuda'
            cxx_version: '23'
          - image: 'latest'  # nvcc 12 only supports C++-20
            backend:
              name: 'cuda'
            cxx_version: '23'
    runs-on: ubuntu-latest
    needs: [docker-build, id_repo]
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be  # v1.3.1
        with:
          tool-cache: true
      - name: Checkout built branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Collect image artifact
        if: needs.id_repo.outputs.in_base_repo == 'false'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: |
            ${{matrix.image}}_${{matrix.backend.name}}-artifact
      - name: Load image artifact into docker
        if: needs.id_repo.outputs.in_base_repo == 'false'
        run: |
          docker load < ${{matrix.image}}_${{matrix.backend.name}}.tar
          rm ${{matrix.image}}_${{matrix.backend.name}}.tar
      - name: Choose degree
        run: |
          FILES_CHANGED=$(gh pr diff ${{github.event.pull_request.number}} --name-only)
          if printf '%s\n' "$FILES_CHANGED" | grep -q '/splines/'
          then
            echo "DDC_SPLINES_TEST_DEGREE_MIN=1"
            echo "DDC_SPLINES_TEST_DEGREE_MAX=5"
            echo "DDC_SPLINES_TEST_DEGREE_MIN=1" >> $GITHUB_ENV
            echo "DDC_SPLINES_TEST_DEGREE_MAX=5" >> $GITHUB_ENV
          else
            echo "DDC_SPLINES_TEST_DEGREE_MIN=3"
            echo "DDC_SPLINES_TEST_DEGREE_MAX=3"
            echo "DDC_SPLINES_TEST_DEGREE_MIN=3" >> $GITHUB_ENV
            echo "DDC_SPLINES_TEST_DEGREE_MAX=3" >> $GITHUB_ENV
          fi
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      - name: Test
        id: test
        run: |
          cat<<-'EOF' > run.sh
            set -e

            export DDC_ROOT=$PWD/opt/ddc

            export CMAKE_BUILD_PARALLEL_LEVEL=4
            export CMAKE_BUILD_TYPE=${{matrix.build_type.cmake_build_type}}

            export CC=${{matrix.backend.c_compiler}}
            export CXX=${{matrix.backend.cxx_compiler}}

            export NVCC_PREPEND_FLAGS="-Werror all-warnings"

            cmake \
              -D CMAKE_CXX_FLAGS="-Werror -Wall -Wextra -Wpedantic -Wno-sign-compare -pedantic-errors ${{matrix.build_type.cxx_flags}} ${{matrix.backend.ddc_extra_cxx_flags}}" \
              -D CMAKE_CXX_STANDARD=${{matrix.cxx_version}} \
              -D DDC_BUILD_BENCHMARKS=ON \
              -D DDC_BUILD_KERNELS_FFT=ON \
              -D DDC_BUILD_KERNELS_SPLINES=ON \
              -D DDC_BUILD_PDI_WRAPPER=ON \
              -D DDC_BUILD_EXAMPLES=ON \
              -D DDC_benchmark_DEPENDENCY_POLICY=INSTALLED \
              -D DDC_GTest_DEPENDENCY_POLICY=INSTALLED \
              -D DDC_Kokkos_DEPENDENCY_POLICY=INSTALLED \
              -D DDC_KokkosFFT_DEPENDENCY_POLICY=INSTALLED \
              -D DDC_KokkosKernels_DEPENDENCY_POLICY=INSTALLED \
              -D DDC_SPLINES_TEST_DEGREE_MIN=${{env.DDC_SPLINES_TEST_DEGREE_MIN}} \
              -D DDC_SPLINES_TEST_DEGREE_MAX=${{env.DDC_SPLINES_TEST_DEGREE_MAX}} \
              -B build \
              -S /src
            cmake --build build
            if [ 'xcpu' = 'x${{matrix.backend.name}}' ]
            then
              ctest --test-dir build --output-on-failure --timeout 25 --output-junit tests.xml
              cp build/tests.xml .
            fi
            cmake --install build --prefix $DDC_ROOT
            rm -rf build

            cmake \
              -B build \
              -S /src/install_test
            cmake --build build
          EOF

          docker run \
            --cidfile='docker.cid' \
            --volume ${PWD}:/src:ro \
            ghcr.io/cexa-project/ddc/${{matrix.image}}_${{matrix.backend.name}}:${GITHUB_SHA:0:7} \
            bash /src/run.sh
          if docker cp "$(cat docker.cid)":/data/tests.xml ${{github.workspace}}/tests.xml
          then echo "with_report=true" >> "$GITHUB_OUTPUT"
          else echo "with_report=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d  # v6.4.1
        if: ( success() || failure() ) && steps.test.outputs.with_report == 'true'  # always run even if the previous step fails
        with:
          annotate_only: true  # forked repo cannot write to checks so just do annotations
          report_paths: '${{github.workspace}}/tests.xml'

  test-with-sanitizer:
    if: github.ref_name != 'main'
    strategy:
      fail-fast: false
      matrix:
        image: ['latest']
        backend:
          - name: 'cpu'
            c_compiler: 'gcc'
            cxx_compiler: 'g++'
        cxx_version: ['20']
        cmake_build_type: ['Debug']
        sanitizer: ['address', 'undefined']
    runs-on: ubuntu-latest
    needs: [docker-build, id_repo]
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be  # v1.3.1
        with: {tool-cache: true, large-packages: false}
      - name: Checkout built branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Collect image artifact
        if: needs.id_repo.outputs.in_base_repo == 'false'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: |
            ${{matrix.image}}_${{matrix.backend.name}}-artifact
      - name: Load image artifact into docker
        if: needs.id_repo.outputs.in_base_repo == 'false'
        run: |
          docker load < ${{matrix.image}}_${{matrix.backend.name}}.tar
          rm ${{matrix.image}}_${{matrix.backend.name}}.tar
      - name: Generate undefined sanitizer environment
        if: matrix.sanitizer == 'undefined'
        run: |
          cat<<-'UBSAN_SUPP_EOF' > ubsan.supp
            vptr:ginkgo/core/solver/solver_base.hpp
          UBSAN_SUPP_EOF

          cat<<-'SANITIZER_ENV_EOF' > sanitizer_env.sh
            export UBSAN_OPTIONS=print_stacktrace=1,halt_on_error=1,suppressions=/src/ubsan.supp
          SANITIZER_ENV_EOF
      - name: Test
        id: test
        run: |
          cat<<-'EOF' > run.sh
            set -e

            export CMAKE_BUILD_PARALLEL_LEVEL=4
            export CMAKE_BUILD_TYPE=${{matrix.cmake_build_type}}

            export CC=${{matrix.backend.c_compiler}}
            export CXX=${{matrix.backend.cxx_compiler}}

            cmake \
              -D CMAKE_CXX_FLAGS="-fsanitize=${{matrix.sanitizer}} -fno-omit-frame-pointer" \
              -D CMAKE_CXX_STANDARD=${{matrix.cxx_version}} \
              -D DDC_BUILD_BENCHMARKS=ON \
              -D DDC_BUILD_KERNELS_FFT=ON \
              -D DDC_BUILD_KERNELS_SPLINES=ON \
              -D DDC_BUILD_PDI_WRAPPER=ON \
              -D DDC_BUILD_EXAMPLES=ON \
              -D DDC_benchmark_DEPENDENCY_POLICY=INSTALLED \
              -D DDC_GTest_DEPENDENCY_POLICY=INSTALLED \
              -D DDC_Kokkos_DEPENDENCY_POLICY=INSTALLED \
              -D DDC_KokkosFFT_DEPENDENCY_POLICY=INSTALLED \
              -D DDC_KokkosKernels_DEPENDENCY_POLICY=INSTALLED \
              -B build \
              -S /src
            cmake --build build

            if [ -f /src/sanitizer_env.sh ];
            then
              . /src/sanitizer_env.sh
            fi

            ctest --test-dir build --output-on-failure --timeout 30 --output-junit tests.xml
            cp build/tests.xml .
          EOF

          docker run \
            --cidfile='docker.cid' \
            -v ${PWD}:/src:ro \
            ghcr.io/cexa-project/ddc/${{matrix.image}}_${{matrix.backend.name}}:${GITHUB_SHA:0:7} \
            bash /src/run.sh
          if docker cp "$(cat docker.cid)":/data/tests.xml ${{github.workspace}}/tests.xml
          then echo "with_report=true" >> "$GITHUB_OUTPUT"
          else echo "with_report=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d  # v6.4.1
        if: ( success() || failure() ) && steps.test.outputs.with_report == 'true'  # always run even if the previous step fails
        with:
          annotate_only: true  # forked repo cannot write to checks so just do annotations
          report_paths: '${{github.workspace}}/tests.xml'

  clang-tidy-test:
    if: github.ref_name != 'main'
    strategy:
      fail-fast: false
      matrix:
        image: ['latest']
        backend:
          - name: 'cpu'
            c_compiler: 'clang'
            cxx_compiler: 'clang++'
        cxx_version: ['20']
        cmake_build_type: ['Release']
    runs-on: ubuntu-latest
    needs: [docker-build, id_repo]
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be  # v1.3.1
        with: {tool-cache: true, large-packages: false}
      - name: Checkout built branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Collect image artifact
        if: needs.id_repo.outputs.in_base_repo == 'false'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: |
            ${{matrix.image}}_${{matrix.backend.name}}-artifact
      - name: Load image artifact into docker
        if: needs.id_repo.outputs.in_base_repo == 'false'
        run: |
          docker load < ${{matrix.image}}_${{matrix.backend.name}}.tar
          rm ${{matrix.image}}_${{matrix.backend.name}}.tar
      - name: clang-tidy
        run: |
          cat<<-'EOF' > run.sh
            set -e

            export CMAKE_BUILD_PARALLEL_LEVEL=4
            export CMAKE_BUILD_TYPE=${{matrix.cmake_build_type}}

            export CC=${{matrix.backend.c_compiler}}
            export CXX=${{matrix.backend.cxx_compiler}}

            cmake \
              -D BUILD_TESTING=ON \
              -D CMAKE_CXX_CLANG_TIDY=clang-tidy \
              -D CMAKE_CXX_STANDARD=${{matrix.cxx_version}} \
              -D DDC_BUILD_BENCHMARKS=ON \
              -D DDC_BUILD_KERNELS_FFT=ON \
              -D DDC_BUILD_KERNELS_SPLINES=ON \
              -D DDC_BUILD_PDI_WRAPPER=ON \
              -D DDC_BUILD_EXAMPLES=ON \
              -D DDC_benchmark_DEPENDENCY_POLICY=INSTALLED \
              -D DDC_GTest_DEPENDENCY_POLICY=INSTALLED \
              -D DDC_Kokkos_DEPENDENCY_POLICY=INSTALLED \
              -D DDC_KokkosFFT_DEPENDENCY_POLICY=INSTALLED \
              -D DDC_KokkosKernels_DEPENDENCY_POLICY=INSTALLED \
              -B build \
              -S /src
            cmake --build build
          EOF

          docker run \
            -v ${PWD}:/src:ro \
            ghcr.io/cexa-project/ddc/${{matrix.image}}_${{matrix.backend.name}}:${GITHUB_SHA:0:7} \
            bash /src/run.sh
