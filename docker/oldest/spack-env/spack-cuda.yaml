---
spack:
  concretizer:
    reuse: false
    unify: true
  packages:
    all:
      require:
        - 'target=x86_64'
        - '+cuda cuda_arch=80'
        - '~rocm'
        - '~openmp'
        - '~mpi'
        - '~fortran'
    c:
      require: 'gcc@11'
    cuda:
      buildable: false
      externals:
        - spec: cuda@12.2
          prefix: /usr/local/cuda-12.2
    cxx:
      require: 'gcc@11'
    fortran:
      require: 'gcc@11'
    lapack:
      require: 'openblas@0.3'
  repos:
    builtin:
      tag: v2026.06.0
  specs:
    - 'gcc@11'
    - 'benchmark@1.9 ~performance_counters'
    - 'cmake@3.25'
    - 'ginkgo@1.8'
    - 'googletest@1.14 +gmock'
    - 'kokkos@4.7 +cuda_constexpr +cuda_relocatable_device_code'
    - 'kokkos-fft@0.3 host_backend=fftw-serial device_backend=cufft'
    - 'kokkos-kernels@4.7'
    - 'lapack'
    - 'paraconf@1.0'
    - 'pdi@1.10.1:1.10'
    - 'pdiplugin-decl-hdf5@1.10.1:1.10'
    - 'pdiplugin-user-code@1.10.1:1.10'
    - 'pdiplugin-trace@1.10.1:1.10'
  view:
    default:
      root: .spack-env/view
      exclude: ['gcc-runtime']
