---
spack:
  concretizer:
    reuse: false
    unify: true
  packages:
    all:
      require:
        - 'target=x86_64'
        - '+cuda cuda_arch=80'
        - '~rocm'
        - '~openmp'
        - '~mpi'
        - '~fortran'
    c:
      require: 'gcc@12'
    cuda:
      buildable: false
      externals:
        - spec: cuda@12.9
          prefix: /usr/local/cuda-12.9
    cxx:
      require: 'gcc@12'
    fortran:
      require: 'gcc@12'
    lapack:
      require: 'openblas@0.3'
  repos:
    builtin:
      tag: v2026.03.0
  specs:
    - 'gcc@12'
    - 'benchmark@1.9 ~performance_counters'
    - 'cmake@4.2'
    - 'ginkgo@1.11'
    - 'googletest@1.17 +gmock'
    - 'kokkos@5.0 +cuda_constexpr +cuda_relocatable_device_code'
    - 'kokkos-fft@1.0 host_backend=fftw-serial device_backend=cufft'
    - 'kokkos-kernels@5.0'
    - 'lapack'
    - 'paraconf@1.0'
    - 'pkgconfig'
    - 'pdi@1.10.1:1.10'
    - 'pdiplugin-decl-hdf5@1.10.1:1.10'
    - 'pdiplugin-user-code@1.10.1:1.10'
    - 'pdiplugin-trace@1.10.1:1.10'
  view:
    default:
      root: .spack-env/view
      exclude: ['gcc-runtime']
