---
name: Tests on Windows

# yamllint disable-line rule:truthy
on:
  pull_request:
    paths:
      - '.github/workflows/tests-windows.yaml'
      - '**.cpp'
      - '**.hpp'
      - '**.hpp.in'
      - 'CMakeLists.txt'
      - '**/CMakeLists.txt'
      - '**.cmake'
      - '**.cmake.in'
      - 'docker/**'
      - 'vendor/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/tests-windows.yaml'
      - '**.cpp'
      - '**.hpp'
      - '**.hpp.in'
      - 'CMakeLists.txt'
      - '**/CMakeLists.txt'
      - '**.cmake'
      - '**.cmake.in'
      - 'docker/**'
      - 'vendor/**'

concurrency:
  group: ${{github.workflow}}-${{github.ref == github.ref_protected && github.run_id || github.event.pull_request.number || github.ref}}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-windows:
    if: github.ref_name != 'main'
    strategy:
      fail-fast: false
      matrix:
        cxx_version: ['20', '23']
        config:
          - build_shared_libs: 'OFF'
            build_type: 'Release'
            msvc_runtime: 'MultiThreaded'
          - build_shared_libs: 'OFF'
            build_type: 'Debug'
            msvc_runtime: 'MultiThreadedDebug'
        os: [windows-2022, windows-2025]
    runs-on: ${{matrix.os}}
    env:
      Kokkos_ROOT: ${{github.workspace}}/opt/kokkos
      GTest_ROOT: ${{github.workspace}}/opt/gtest
      CMAKE_BUILD_PARALLEL_LEVEL: 4
    steps:
      - name: Checkout built branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          repository: google/googletest
          ref: v1.17.0
          path: googletest
      - name: Install Google test
        shell: bash
        run: |
          cmake \
            -D BUILD_SHARED_LIBS=${{matrix.config.build_shared_libs}} \
            -D CMAKE_MSVC_RUNTIME_LIBRARY=${{matrix.config.msvc_runtime}} \
            -B build \
            -S googletest
          cmake --build build --config ${{matrix.config.build_type}}
          cmake --install build --config ${{matrix.config.build_type}} --prefix $GTest_ROOT
          rm -rf build
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          repository: kokkos/kokkos
          ref: 5.0.2
          path: kokkos
      - name: Install Kokkos
        shell: bash
        run: |
          cmake \
            -D BUILD_SHARED_LIBS=${{matrix.config.build_shared_libs}} \
            -D CMAKE_MSVC_RUNTIME_LIBRARY=${{matrix.config.msvc_runtime}} \
            -D Kokkos_ENABLE_DEPRECATED_CODE_4=OFF \
            -D Kokkos_ENABLE_DEPRECATION_WARNINGS=OFF \
            -D Kokkos_ENABLE_SERIAL=ON \
            -B build \
            -S kokkos
          cmake --build build --config ${{matrix.config.build_type}}
          cmake --install build --config ${{matrix.config.build_type}} --prefix $Kokkos_ROOT
          rm -rf build
      - name: Build DDC
        shell: bash
        run: |
          cmake \
            -D BUILD_SHARED_LIBS=${{matrix.config.build_shared_libs}} \
            -D CMAKE_CXX_STANDARD=${{matrix.cxx_version}} \
            -D CMAKE_MSVC_RUNTIME_LIBRARY=${{matrix.config.msvc_runtime}} \
            -D DDC_BUILD_KERNELS_FFT=OFF \
            -D DDC_BUILD_KERNELS_SPLINES=OFF \
            -D DDC_BUILD_PDI_WRAPPER=OFF \
            -B build
          cmake --build build --config ${{matrix.config.build_type}}
          ctest --test-dir build --build-config ${{matrix.config.build_type}} --output-on-failure --timeout 10 --output-junit tests.xml
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d  # v6.4.1
        if: ( success() || failure() )  # always run even if the previous step fails
        with:
          annotate_only: true  # forked repo cannot write to checks so just do annotations
          report_paths: '${{github.workspace}}/build/tests.xml'
