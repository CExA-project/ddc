---
spack:
  concretizer:
    reuse: false
    unify: true
  packages:
    all:
      require:
        - 'target=x86_64'
        - '~cuda'
        - '~rocm'
        - '~openmp'
        - '~mpi'
        - '~fortran'
    c:
      require: 'gcc@13'
    cxx:
      require: 'gcc@13'
    fortran:
      require: 'gcc@13'
    lapack:
      require: 'openblas@0.3'
  repos:
    builtin:
      tag: v2026.06.0
  specs:
    - 'gcc@13'
    - 'benchmark@1.9 ~performance_counters'
    - 'cmake@4.2'
    - 'ginkgo@1.11'
    - 'googletest@1.17 +gmock'
    - 'kokkos@5.1'
    - 'kokkos-fft@1.1 host_backend=fftw-serial'
    - 'kokkos-kernels@5.1'
    - 'lapack'
    - 'paraconf@1.0'
    - 'pdi@1.11'
    - 'pdiplugin-decl-hdf5@1.11'
    - 'pdiplugin-user-code@1.11'
    - 'pdiplugin-trace@1.11'
    - 'py-gcovr@8.6'
    - 'py-numpy@2.4'
    - 'py-pytest@9.0'
  view:
    default:
      root: .spack-env/view
      exclude: ['gcc-runtime']
