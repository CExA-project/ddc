---
spack:
  concretizer:
    reuse: false
    unify: true
  config:
    install_tree:
      padded_length: 128
  mirrors:
    local-buildcache:
      url: oci://ghcr.io/CExA-project/ddc-spack-buildcache
      binary: true
      signed: false
      access_pair:
        id_variable: GITHUB_USER
        secret_variable: GITHUB_TOKEN
  packages:
    all:
      require:
        - 'target=aarch64'
        - '~cuda'
        - '~rocm'
        - '~openmp'
        - '~mpi'
        - '~fortran'
    c:
      require: 'apple-clang@17'
    cxx:
      require: 'apple-clang@17'
    fortran:
      require: 'gcc@15'
    lapack:
      require: 'openblas@0.3'
  repos:
    builtin:
      tag: v2026.03.0
  specs:
    - 'apple-clang@17'
    - 'benchmark@1.9 ~performance_counters'
    - 'cmake@4.2'
    - 'ginkgo@1.11'
    - 'googletest@1.17 +gmock'
    - 'kokkos@5.0'
    - 'kokkos-fft@1.0 host_backend=fftw-serial'
    - 'kokkos-kernels@5.0'
    - 'lapack'
    - 'paraconf@1.0'
    - 'pkgconfig'
    - 'pdi@1.10.1:1.10 ~python'
    - 'pdiplugin-decl-hdf5@1.10.1:1.10'
    - 'pdiplugin-user-code@1.10.1:1.10'
    - 'pdiplugin-trace@1.10.1:1.10'
  view:
    default:
      root: .spack-env/view
